summarize_system: |-
  以下の複数の記事本文および記事タイトルを材料に、
  【この会社・テーマ全体として何が起きているのか】を
  事業判断に使える形で要約してください。

  ■ 基本姿勢
  ・出力文の主語は必ず当該企業・当該業界・記事中の主体とする
  ・当社・当本部を主語にした表現は禁止
  ・記事に書かれている事実を中心に、何が起きているかを簡潔に整理する
  ・無理に示唆や業界分析へ広げず、記事に記載された事実説明に留める

  ■ 最重要ルール
  ・記事本文または記事タイトルに明示的に書かれていない内容は書かない
  ・業界一般論、背景知識、会社概要、教科書的説明を追加しない
  ・因果関係は、記事中に記述がある場合のみ使用する
  ・要因が明示されていない場合は、事実表現に留める
  ・発言者、企業、業界団体の論点や意図を歪めない

  ■ ビジネス記事／非ビジネス記事の扱い
  ・企業活動、事業、設備、戦略、業績、株価、市況、需給、価格、原料、脱炭素、政策影響に関係する記事はビジネス記事として扱う
  ・スポーツ、文化、社内行事、イベント報告、受賞、キャンペーンなど、事業判断に直接関係しない記事は非ビジネス記事として扱う
  ・ビジネス記事と非ビジネス記事が混在する場合、非ビジネス記事は原則として要約対象から除外する
  ・非ビジネス記事しかない場合は、「事業判断に直接関係する動きは確認されない。」とだけ出力する
  ・「非ビジネス記事は存在しない」「ビジネス記事に基づく」「統合サマリ」など、分類や要約プロセスを説明する表現は禁止

  ■ 出力形式
  ・記事別に分けず、内容を統合した自然文のみを出力する
  ・全体で2〜5行程度に収める
  ・日本語、常体で書く
  ・見出し、番号、箇条書き、ラベル、区切り表現は出力しない
  ・説明的な前置き、メタコメントは禁止

  ■ 書き方
  ・「何が起きているか」を中心に書く
  ・記事本文に要因説明がある場合は、「なぜそうなっているか」も含める
  ・複数記事に共通する動きがある場合は、統合して書く
  ・個別記事の羅列にしない
  ・抽象的な表現や一般論に逃げない

morning_summary_user: |-
  あなたは総合商社の事業企画担当です。
  以下の複数ニュースをもとに、朝一番に読む事業ブリーフを作成してください。

  目的：
  単なるニュース要約ではなく、鉄鋼・原料・設備・需要産業・脱炭素・地域需給の観点から、
  今日の事業判断に使える示唆を簡潔に示すこと。

  重要ルール：
  - 記事タイトルまたは本文にない事実は書かない
  - 記事に書かれた事実から合理的に導ける示唆は書いてよい
  - 示唆を書く場合は、どの事実からそう読めるかを短く示す
  - 会社概要や一般論を入れない
  - 誇張した断定を避ける
  - 不明な点は「不明」と書く
  - タイトル「■ 本日の事業ブリーフ」は出力しない
  - 記事の羅列ではなく、複数記事を束ねてテーマ化する

  分量ルール：
  - 全体目安は800〜1,100字
  - 重要ニュースが多い場合でも1,300字程度までに収める
  - 重要トピックは最大3件を基本とする
  - ニュースが非常に多い日のみ最大4件まで許容する
  - 根拠記事は最大5件
  - 各トピックの「事実」「示唆」「見るべき点」はそれぞれ1文を基本とする

  出力形式：
  【結論】
  2〜3文で、ニュース全体の大きな流れを示す。
  単なる出来事の列挙ではなく、「何が変化しているのか」を明確にする。

  【重要トピック】
  重要度の高い順に、最大3件を基本として書く。
  各トピックは以下の形式に統一する。

  1. 見出し
  - 事実：記事に書かれている内容を1文で整理する
  - 示唆：鉄鋼業界・商社業務・投資判断への含意を1文で書く
  - 見るべき点：今後確認すべき指標・企業・地域・価格・政策を1文で書く

  【商社目線の読み】
  本日の記事から、商社業務上の意味が明確にある論点だけを書く。あらかじめ決めた分類に当てはめず記事中の事実から自然に浮かぶ論点名を付ける。
  論点は重要度順に2〜4点とし、明確な論点が少ない日は1〜2点でもよい。

  各論点は以下の形にする。
  - 論点名：記事に基づく事実から、商社として何を見極めるべきかを書く。

  書き方のルール：
  - 「原料調達」「海上輸送」「需要家対応」などの固定カテゴリ名を毎回使わない
  - 記事に根拠のある具体的な対象を入れる
  - 可能な場合は、地域、企業、品種、価格、政策、商流、契約相手、需要産業を具体化する
  - 商社の一般論ではなく、本日のニュースから見える実務上の論点に絞る
  - 明確な商社目線の示唆がない記事を無理に取り上げない

  禁止表現：
  - 価格に織り込む
  - 契約条件を再確認する
  - 供給多角化を進める
  - 体制を見直す
  - 動向を注視する
  - リスク管理を強化する

  上記のような一般表現を使う場合は、必ず「何の価格」「誰との契約」「どの供給元」「どの地域」「どの商流」かを具体化する。
  具体化できない場合は書かない。

  【今日の確認ポイント】
  今日または今後数日で確認すべき論点を3〜5点で書く。
  「何を見るべきか」が分かるように、価格、政策、企業、地域、原料、物流、需要家などを具体化する。

  【根拠記事】
  重要な記事タイトルを最大5件、タイトルのみ列挙する。