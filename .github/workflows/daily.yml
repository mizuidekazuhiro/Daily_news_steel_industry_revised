name: Daily Main News

on:
  workflow_dispatch:
  schedule:
    - cron: '49 21 * * 0-4'

jobs:
  daily_news_general:
    runs-on: ubuntu-latest
    env:
      OPENAI_TRANSLATION_MODEL: ${{ vars.OPENAI_TRANSLATION_MODEL }}
      OPENAI_MAX_OUTPUT_TOKENS: ${{ vars.OPENAI_MAX_OUTPUT_TOKENS }}
      OPENAI_TRANSLATION_BATCH_SIZE: ${{ vars.OPENAI_TRANSLATION_BATCH_SIZE }}
      OPENAI_RESPONSE_TRUNCATE_CHARS: ${{ vars.OPENAI_RESPONSE_TRUNCATE_CHARS }}
      OPENAI_BRIEF_ENABLED: ${{ vars.OPENAI_BRIEF_ENABLED }}
      OPENAI_BRIEF_MODEL: ${{ vars.OPENAI_BRIEF_MODEL }}
      OPENAI_BRIEF_REASONING_EFFORT: ${{ vars.OPENAI_BRIEF_REASONING_EFFORT }}
      OPENAI_BRIEF_VERBOSITY: ${{ vars.OPENAI_BRIEF_VERBOSITY }}
      OPENAI_BRIEF_MAX_OUTPUT_TOKENS: ${{ vars.OPENAI_BRIEF_MAX_OUTPUT_TOKENS }}
      OPENAI_BRIEF_TOP_N: ${{ vars.OPENAI_BRIEF_TOP_N }}
      OPENAI_BRIEF_PROMPT_PATH: ${{ vars.OPENAI_BRIEF_PROMPT_PATH }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python news_digest.py --job main
