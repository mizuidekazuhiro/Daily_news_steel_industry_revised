name: Daily Steel News (Serper)

on:
  schedule:
  - cron: '49 21 * * 0-4'   # UTC基準: 日〜木 21:49 = JST 月〜金 06:49
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt


      - name: Run news bot
        run: python main.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_ARTICLES_DB_ID: ${{ secrets.NOTION_ARTICLES_DB_ID }}
          NOTION_DAILY_DB_ID: ${{ secrets.NOTION_DAILY_DB_ID }}
          NOTION_TARGETS_DB_ID: ${{ secrets.NOTION_TARGETS_DB_ID }}
          NOTION_RULES_DB_ID: ${{ secrets.NOTION_RULES_DB_ID }}
          OPENAI_LABEL_SUMMARY_MODEL: ${{ vars.OPENAI_LABEL_SUMMARY_MODEL }}
          OPENAI_LABEL_SUMMARY_TEMPERATURE: ${{ vars.OPENAI_LABEL_SUMMARY_TEMPERATURE }}
          OPENAI_LABEL_SUMMARY_REASONING_EFFORT: ${{ vars.OPENAI_LABEL_SUMMARY_REASONING_EFFORT }}
          OPENAI_LABEL_SUMMARY_VERBOSITY: ${{ vars.OPENAI_LABEL_SUMMARY_VERBOSITY }}
          OPENAI_LABEL_SUMMARY_MAX_OUTPUT_TOKENS: ${{ vars.OPENAI_LABEL_SUMMARY_MAX_OUTPUT_TOKENS }}
          OPENAI_MORNING_SUMMARY_MODEL: ${{ vars.OPENAI_MORNING_SUMMARY_MODEL }}
          OPENAI_MORNING_SUMMARY_TEMPERATURE: ${{ vars.OPENAI_MORNING_SUMMARY_TEMPERATURE }}
          OPENAI_MORNING_SUMMARY_REASONING_EFFORT: ${{ vars.OPENAI_MORNING_SUMMARY_REASONING_EFFORT }}
          OPENAI_MORNING_SUMMARY_VERBOSITY: ${{ vars.OPENAI_MORNING_SUMMARY_VERBOSITY }}
          OPENAI_MORNING_SUMMARY_MAX_OUTPUT_TOKENS: ${{ vars.OPENAI_MORNING_SUMMARY_MAX_OUTPUT_TOKENS }}
